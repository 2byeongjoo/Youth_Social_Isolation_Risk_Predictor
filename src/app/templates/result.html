<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>예측 결과</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container result-container">
        <h1>예측 결과</h1>

        <div class="result-box">
            <p class="result-label">모델 예측 결과</p>
            <p class="result-value">{{ prediction_label }}</p>
        </div>

        <div class="result-box">
            <p class="result-label">고립은둔 가능성</p>
            <p class="result-value">{{ probability_percent }}%</p>
        </div>

        <div class="notice">
            <p>
                이 결과는 공공데이터를 기반으로 학습한 모델의 참고용 예측 결과입니다.
                실제 고립 여부를 진단하거나 단정하는 용도로 사용할 수 없습니다.
            </p>
        </div>

        <a class="back-link" href="/">다시 예측하기</a>
    </div>
</body>
</html>
